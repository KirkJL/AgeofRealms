<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    http-equiv="Content-Security-Policy"
    content="
      default-src 'self';
      script-src 'self' https://unpkg.com;
      style-src 'self' 'unsafe-inline';
      connect-src 'self' https://YOUR-WORKER.your-subdomain.workers.dev wss://YOUR-WORKER.your-subdomain.workers.dev;
      img-src 'self' data:;
      object-src 'none';
      base-uri 'self';
      frame-ancestors 'none';
    "
  />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Age of Realms</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="game"></div>

  <div id="loginPanel" class="panel center-panel">
    <h1>Age of Realms</h1>
    <p>RuneScape2-inspired browser MMO prototype.</p>
    <input id="username" maxlength="16" placeholder="Username" />
    <input id="password" maxlength="64" type="password" placeholder="Password" />
    <button id="loginBtn">Login / Create</button>
    <div id="loginMsg"></div>
  </div>

  <div id="hud" class="hidden">
    <div class="brand">Age of Realms</div>
    <div id="status">Disconnected</div>
    <div id="coords">0, 0</div>
  </div>

  <div id="rightPanel" class="panel hidden">
    <h2>Skills</h2>
    <div id="skills"></div>
    <h2>Inventory</h2>
    <div id="inventory"></div>
    <h2>Bank</h2>
    <button id="bankBtn">Open Bank</button>
    <div id="bank"></div>
  </div>

  <div id="actionPanel" class="panel hidden">
    <div id="targetName">No target</div>
    <button id="actionBtn">Action</button>
  </div>

  <div id="chat" class="hidden">
    <div id="messages"></div>
    <input id="chatInput" maxlength="120" placeholder="Press Enter to chat..." />
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
